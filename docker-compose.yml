services:
  builder:
    build:
      context: .
      dockerfile: Dockerfile
    image: stm32h757-builder:latest
    container_name: stm32h757-compiler
    volumes:
      - .:${PWD}
      - /opt/st/stm32cubeide_2.2.0/plugins/com.st.stm32cube.ide.mcu.externaltools.gnu-tools-for-stm32.14.3.rel1.linux64_1.0.100.202602081740/tools:/opt/st-toolchain
    environment:
      - PATH=/opt/st-toolchain/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    working_dir: ${PWD}
    user: "${UID:-1000}:${GID:-1000}"
    command: make all
